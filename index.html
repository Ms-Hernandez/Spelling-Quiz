<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NCEA Literacy: 60-Item Spelling Assessment</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; width: 100%; max-width: 850px; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        
        /* Login Screen */
        #login-screen { text-align: center; padding: 50px; }
        .login-input { padding: 15px; font-size: 18px; width: 300px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 20px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .student-info { font-size: 14px; color: #555; }
        .cheat-badge { color: var(--danger); font-weight: bold; background: #fff5f5; padding: 5px 12px; border-radius: 20px; border: 1px solid #feb2b2; }
        .timer { font-size: 20px; font-weight: bold; color: var(--primary); }

        .quiz-area { text-align: center; min-height: 300px; display: none; flex-direction: column; justify-content: center; }
        .audio-btn { background: var(--accent); color: white; border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 28px; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        .audio-btn:hover { transform: scale(1.1); }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; max-width: 400px; margin: 0 auto; }
        .opt-btn { padding: 15px; border: 2px solid #ddd; border-radius: 8px; background: white; font-size: 18px; cursor: pointer; }
        .opt-btn:hover { border-color: var(--accent); background: #f0f7ff; }

        .type-input { width: 80%; max-width: 400px; margin: 20px auto; padding: 15px; font-size: 22px; text-align: center; border: 3px solid #eee; border-radius: 10px; outline: none; }
        .submit-btn { background: var(--primary); color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }

        #summary { display: none; text-align: center; }
        .score-circle { font-size: 50px; color: var(--success); margin: 20px 0; font-weight: bold; }
        @media print { .submit-btn { display: none; } .container { box-shadow: none; border: none; } }
    </style>
</head>
<body onblur="reportCheat()">

<div class="container">
    <div id="login-screen">
        <h1>NCEA Literacy Spelling Assessment</h1>
        <p>Please enter your full name to begin the 50-minute assessment.</p>
        <input type="text" id="studentNameInput" class="login-input" placeholder="Enter Full Name..." required>
        <br>
        <button class="submit-btn" onclick="startAssessment()">Start Assessment</button>
    </div>

    <div id="quiz-ui" style="display:none;">
        <div class="header">
            <div class="student-info">
                <strong>Student:</strong> <span id="displayName">---</span><br>
                <span id="stageName">Stage 1</span>
            </div>
            <div class="timer" id="timerDisplay">50:00</div>
            <div class="cheat-badge">Tab Swaps: <span id="cheatVal">0</span></div>
        </div>

        <div class="quiz-area" id="mainArea" style="display:flex;">
            <p id="progressText">Question 1 / 60</p>
            <button class="audio-btn" onclick="playAudio()">🔊</button>
            <div id="interaction-area"></div>
        </div>
    </div>

    <div id="summary">
        <h1>Official Result Summary</h1>
        <p><strong>Student Name:</strong> <span id="sumName">---</span></p>
        <div class="score-circle" id="finalTotal">0 / 60</div>
        <div style="margin: 20px 0;">
            Easy: <span id="eScore">0/20</span> | 
            Average: <span id="aScore">0/20</span> | 
            Difficult: <span id="dScore">0/20</span>
        </div>
        <p id="integrityStatus" style="font-weight:bold;"></p>
        <p style="font-size: 12px; color: #777;">Assessment completed on: <span id="dateStamp"></span></p>
        <button onclick="window.print()" class="submit-btn" style="background:var(--success)">Print to PDF / Submit to Teacher</button>
    </div>
</div>

<script>
    const easyData = [
        {word: "believe", opts: ["beleive", "believe", "beleeve"]}, {word: "different", opts: ["different", "diferent", "diffarent"]},
        {word: "business", opts: ["buisness", "business", "busines"]}, {word: "possible", opts: ["posible", "possible", "possable"]},
        {word: "important", opts: ["important", "importent", "importent"]}, {word: "probably", opts: ["probly", "probably", "probubly"]},
        {word: "interest", opts: ["interest", "intrest", "interrest"]}, {word: "general", opts: ["genral", "general", "generel"]},
        {word: "describe", opts: ["describe", "discribe", "descibe"]}, {word: "certain", opts: ["certan", "certain", "sertain"]},
        {word: "imagine", opts: ["imagine", "imagin", "emagine"]}, {word: "minute", opts: ["minit", "minnut", "minute"]},
        {word: "question", opts: ["question", "queshon", "queshun"]}, {word: "reason", opts: ["reason", "reeson", "resun"]},
        {word: "though", opts: ["thogh", "though", "thouh"]}, {word: "special", opts: ["special", "speical", "speshul"]},
        {word: "usually", opts: ["usualy", "usually", "usuelly"]}, {word: "caught", opts: ["caught", "cort", "cauht"]},
        {word: "brought", opts: ["brought", "brort", "browt"]}, {word: "enough", opts: ["enuff", "enough", "enuf"]}
    ];

    const avgWords = ["necessary", "government", "environment", "recommendation", "definitely", "success", "immediately", "accommodation", "beginning", "disappear", "occasion", "parallel", "possession", "separate", "sincerely", "surprise", "tomorrow", "writing", "address", "apparent"];
    const diffWords = ["perspective", "stationery", "exaggerate", "embarrass", "consequently", "alternative", "appropriate", "consistent", "evidence", "identify", "significant", "technique", "evaluate", "frequency", "individual", "legislation", "occurrence", "principle", "guarantee", "rhythm"];

    let currentIndex = 0, cheats = 0, scores = { easy: 0, average: 0, difficult: 0 }, timer = 3000;
    const s1 = shuffle([...easyData]), s2 = shuffle([...avgWords]), s3 = shuffle([...diffWords]);

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function startAssessment() {
        const name = document.getElementById('studentNameInput').value.trim();
        if(!name) return alert("Please enter your name.");
        document.getElementById('displayName').innerText = name;
        document.getElementById('sumName').innerText = name;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        startTimer();
        loadItem();
    }

    function startTimer() {
        const tInterval = setInterval(() => {
            timer--;
            let mins = Math.floor(timer / 60), secs = timer % 60;
            document.getElementById('timerDisplay').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if(timer <= 0) { clearInterval(tInterval); showSummary(); }
        }, 1000);
    }

    function playAudio() {
        let w = currentIndex < 20 ? s1[currentIndex].word : (currentIndex < 40 ? s2[currentIndex-20] : s3[currentIndex-40]);
        const m = new SpeechSynthesisUtterance(w); m.rate = 0.8; window.speechSynthesis.speak(m);
    }

    function loadItem() {
        const area = document.getElementById('interaction-area'), prog = document.getElementById('progressText'), name = document.getElementById('stageName');
        prog.innerText = `Question ${currentIndex + 1} / 60`;
        if (currentIndex < 20) {
            name.innerText = "Stage 1: Easy (Multiple Choice)";
            let choices = shuffle([...s1[currentIndex].opts]);
            area.innerHTML = `<div class="options-grid">${choices.map(c => `<button class="opt-btn" onclick="checkE('${c}')">${c}</button>`).join('')}</div>`;
        } else {
            name.innerText = currentIndex < 40 ? "Stage 2: Average (Recall)" : "Stage 3: Difficult (Academic)";
            area.innerHTML = `<input type="text" id="typeIn" class="type-input" placeholder="Type..." autocomplete="off" onkeydown="if(event.key==='Enter') checkT()"><br><button class="submit-btn" onclick="checkT()">Submit</button>`;
            document.getElementById('typeIn').focus();
        }
    }

    function checkE(c) { if(c === s1[currentIndex].word) scores.easy++; advance(); }
    function checkT() {
        const v = document.getElementById('typeIn').value.toLowerCase().trim();
        if(currentIndex < 40) { if(v === s2[currentIndex-20]) scores.average++; }
        else { if(v === s3[currentIndex-40]) scores.difficult++; }
        advance();
    }

    function advance() { currentIndex++; if(currentIndex < 60) loadItem(); else showSummary(); }
    function reportCheat() { cheats++; document.getElementById('cheatVal').innerText = cheats; }

    function showSummary() {
        document.getElementById('quiz-ui').style.display = "none";
        document.getElementById('summary').style.display = "block";
        document.getElementById('finalTotal').innerText = `${scores.easy+scores.average+scores.difficult} / 60`;
        document.getElementById('eScore').innerText = `${scores.easy}/20`;
        document.getElementById('aScore').innerText = `${scores.average}/20`;
        document.getElementById('dScore').innerText = `${scores.difficult}/20`;
        document.getElementById('dateStamp').innerText = new Date().toLocaleString();
        const s = document.getElementById('integrityStatus');
        s.innerHTML = cheats > 2 ? `<span style="color:red">⚠️ SECURITY ALERT: ${cheats} Tab Swaps Recorded.</span>` : `<span style="color:green">✅ Completed with Integrity.</span>`;
    }
</script>
</body>
</html>
